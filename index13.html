    <style>
        :root {
            --primary: #1d6fa5;
            --secondary: #0b3954;
            --accent: #4ea8de;
            --bg: #f8f9fa;
            --text: #212529;
            --favorite: #d90429;
            --public-db: #00539c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--secondary);
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        header h1 { margin: 0; font-size: 1.5rem; }
        header p { margin: 5px 0 0 0; font-style: italic; color: var(--accent); }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Barre latérale gauche */
        .sidebar {
            width: 360px;
            background: white;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-section {
            padding: 15px 10px;
            overflow-y: auto;
        }
        
        #general-list {
            flex: 1.5;
            border-bottom: 2px dashed #dee2e6;
        }

        #notebook-list {
            flex: 1.5;
            background-color: #fdfdfd;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            margin: 0 0 10px 5px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
            justify-content: space-between;
            padding-right: 5px;
        }

        .toggle-arrow {
            font-size: 0.9rem;
            color: var(--accent);

            width: 100%;

            color: var(--text);

        .spot-item h3 { margin: 0 0 5px 0; font-size: 1rem; color: var(--secondary); }

        /* Badge favori */
        .badge-fav {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--favorite);
            font-size: 1rem;
            display: none;
        }
        .spot-item.is-fav .badge-fav { display: block; }

        /* Conteneur Carte et Recherche */
        .map-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #e5e3df;
        }

        /* Barre de recherche au-dessus de la carte */
        .search-container {
            position: absolute;
            top: 15px;
            left: 50px;
            z-index: 1100;
            width: 340px;
            max-width: calc(100vw - 70px);

            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid #ccc;

        /* Panneau des menus déroulants (Top 10 + Carnet), en surimpression sur la carte */
        .dropdown-overlay {
            position: absolute;

            left: 50px;
            z-index: 1050;

            border-radius: 10px;

        }

        .search-result-item:last-child { border-bottom: none; }

        .search-result-item.public-db-item {
            background-color: #f9fbfd;

            font-size: 0.75rem;
            font-weight: bold;

            flex: 1;
            width: 100%;
            height: 100%;
        }

        /* Style bulle de la carte (Popup Leaflet) */
        .popup-bubble-content {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;

            font-size: 0.95rem;
        }
        .popup-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;

        /* Panneau de détails bas */

            right: 20px;

            overflow-y: auto;

            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }

        .details-info h2 { margin: 0 0 10px 0; color: var(--primary); }
        .details-info ul { margin: 0 0 15px 0; padding-left: 20px; font-size: 0.95rem;}
        
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.2s;
            border: none;
            cursor: pointer;

        .btn-images { background-color: #fbbc05; color: #1a1a1a; }
        .btn-images:hover { background-color: #eaac04; }
        .btn-notebook { background-color: #6c757d; }
        .btn-notebook:hover { background-color: #5a6268; }
        .btn-notebook.active { background-color: var(--favorite); }
        .btn-notebook.active:hover { background-color: #b3031e; }
        .btn-close-action { background-color: #adb5bd; color: #1a1a1a; }
        .btn-close-action:hover { background-color: #919ca6; }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }

        /* Masquage de l'entête (bandeau bleu + recherche + menus) au toucher de la carte */
        header {
            overflow: hidden;
            max-height: 120px;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }
        header.overlay-cachee {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }
        .search-container, .dropdown-overlay {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .search-container.overlay-cachee, .dropdown-overlay.overlay-cachee {
            opacity: 0;
            transform: translateY(-15px);
            pointer-events: none;
        }
        .btn-reafficher-entete {
            position: absolute;
            top: 15px;
            left: 50px;
            z-index: 1100;
            background: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.25s ease;
        }
        .btn-reafficher-entete.visible { display: flex; }

        .empty-notebook { font-style: italic; color: #888; font-size: 0.9rem; padding-left: 5px; }
    </style>
</head>
<body>

    <!-- Script Leaflet JS pour la carte, avec CDN de secours -->
    <script>
        function chargerLeaflet(sources, index) {
            if (index >= sources.length) {
                console.error("Impossible de charger Leaflet depuis tous les CDN.");
                window.leafletEchecTotal = true;
                return;
            }
            var s = document.createElement('script');
            s.src = sources[index];
            s.onload = function() { window.leafletPret = true; };
            s.onerror = function() { chargerLeaflet(sources, index + 1); };
            document.head.appendChild(s);
        }
        chargerLeaflet([
            "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js",
            "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js",
            "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
        ], 0);
    </script>
    <script>
        const initialSpots = [

            { id: 2, title: "2. Carsac-Aillac – Rocher de la Cave", lat: 44.8398, lng: 1.2995, desc: ["Zone connue... mais cachée si tu t'éloignes", "Criques naturelles", "Coins ombragés sous les arbres."], img: "https://images.unsplash.com/photo-1610123598147-f632aa18b275?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 3, title: "3. Vitrac (Amont / Aval)", lat: 44.8302, lng: 1.2315, desc: ["À 200m de la plage principale = calme total", "Bancs de sable isolés", "Le secret bien gardé des locaux."], img: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 4, title: "4. La Roque-Gageac (Criques sous falaise)", lat: 44.8252, lng: 1.1838, desc: ["Petites plages caches sous les falaises", "Ambiance magique le soir."], img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 5, title: "5. Beynac – Berges secondaires", lat: 44.8385, lng: 1.1442, desc: ["Accès rivière discret", "Zones calmes derrière les embarcadères."], img: "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 6, title: "6. Limeuil (Côté Vézère)", lat: 44.8833, lng: 0.8936, desc: ["La confluence magique", "Côté Vézère = beaucoup plus calme."], img: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 7, title: "7. Tamniès (Hors plage principale)", lat: 44.9658, lng: 1.1511, desc: ["Plan d'eau connu mais berges secondaires tranquilles."], img: "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 8, title: "8. Groléjac (Contours du lac)", lat: 44.8211, lng: 1.2915, desc: ["Le spot familial... mais stratégique", "Contour gauche = beaucoup moins de monde."], img: "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 9, title: "9. Castelnaud – Aval du pont", lat: 44.8315, lng: 1.1482, desc: ["Moins connu des touristes", "Petites plages naturelles."], img: "https://images.unsplash.com/photo-1434064511983-18c6dae20ed5?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 10, title: "10. Coux-et-Bigaroque (Berges sauvages)", lat: 44.8342, lng: 0.9739, desc: ["Un des coins les plus 'nature'", "Parfait pour une baignade 100% sauvage."], img: "https://images.unsplash.com/photo-1473448912268-2022ce9509d8?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 11, title: "11. Route des Guignes (24620 Les Eyzies)", lat: 44.949663, lng: 1.020353, desc: ["Accès discret aux berges de la Vézère par un petit chemin", "Loin de l'agitation du centre des Eyzies", "Idéal pour une baignade tranquille."], img: "https://images.unsplash.com/photo-1500964757637-c85e8a162699?w=500&auto=format&fit=crop&q=60", isCustom: false },
            { id: 12, title: "12. Cubjac (24640 Cubjac-Auvézère-Val d'Ans)", lat: 45.2210, lng: 0.9390, desc: ["Plage fluviale aménagée au-dessus du barrage sur l'Auvézère", "Pataugeoire pour enfants et parking sur les deux rives", "Cadre naturel préservé, parfait pour la famille."], img: "https://images.unsplash.com/photo-1437482078695-73f5ca6c96e2?w=500&auto=format&fit=crop&q=60", isCustom: false }
        ];

        let savedSpotIds = [];
        let customSpots = [];
        try {
            savedSpotIds = JSON.parse(localStorage.getItem('perigourdins_notebook_ids')) || [];
            customSpots = JSON.parse(localStorage.getItem('perigourdins_custom_spots')) || [];
            savedSpotIds = savedSpotIds.map(id => id.toString());
        } catch (e) {
            savedSpotIds = [];
            customSpots = [];
        }

        let allSpots = [...initialSpots, ...customSpots];
        let map;
        const markers = {};
        let searchTimeout;
        let tempMarker = null; // repère temporaire posé au clic sur la carte

        const top10Select = document.getElementById('top10-select');

        initialSpots.forEach(spot => {
            if (top10Select) {
                const option = document.createElement('option');
                option.value = spot.id;
                option.innerText = spot.title;
                top10Select.appendChild(option);
            }
        });

        if (top10Select) {
            top10Select.addEventListener('change', () => {
                const chosenId = top10Select.value;
                if (!chosenId) return;
                const spot = initialSpots.find(s => s.id == chosenId);
                if (spot) selectSpot(spot, true);
                top10Select.value = '';
            });
        }

        // --- Masquage de l'entête (recherche + menus) au toucher de la carte ---

        const headerEl = document.querySelector('header');
        const searchContainerEl = document.querySelector('.search-container');
        const dropdownOverlayEl = document.querySelector('.dropdown-overlay');
        const btnReafficherEntete = document.getElementById('btn-reafficher-entete');

        function masquerEntete() {
            if (headerEl) headerEl.classList.add('overlay-cachee');
            if (searchContainerEl) searchContainerEl.classList.add('overlay-cachee');
            if (dropdownOverlayEl) dropdownOverlayEl.classList.add('overlay-cachee');
            if (btnReafficherEntete) btnReafficherEntete.classList.add('visible');
            const resCont = document.getElementById('search-results');
            if (resCont) resCont.style.display = 'none';
        }

        function reafficherEntete() {
            if (headerEl) headerEl.classList.remove('overlay-cachee');
            if (searchContainerEl) searchContainerEl.classList.remove('overlay-cachee');
            if (dropdownOverlayEl) dropdownOverlayEl.classList.remove('overlay-cachee');
            if (btnReafficherEntete) btnReafficherEntete.classList.remove('visible');
        }

        const mapDivEl = document.getElementById('map');
        if (mapDivEl) {
            // pointerdown couvre à la fois le toucher (mobile) et le clic (souris)
            mapDivEl.addEventListener('pointerdown', masquerEntete, { passive: true });
        }

        function demarrerCarte(tentativesRestantes) {
            if (typeof L !== 'undefined') {
                try {
                    map = L.map('map').setView([44.88, 1.15], 10);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(map);

                    allSpots.forEach(spot => createMarker(spot));

                    // Clic sur la carte (hors marqueur existant) : poser un repère
                    // temporaire et afficher ses coordonnées + options de partage.
                    map.on('click', function(e) {
                        afficherLieuClique(e.latlng);
                    });
                } catch (e) {
                    console.error("Erreur de carte :", e);
                }
                return;
            }

            if (window.leafletEchecTotal) {
                const mapDiv = document.getElementById('map');
                if (mapDiv) {
                    mapDiv.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;color:#6c757d;font-size:0.95rem;">⚠️ La carte n\'a pas pu se charger (connexion bloquée ou trop lente). Réessayez en rechargeant la page, ou ouvrez ce lien dans un navigateur standard (Chrome/Safari).</div>';
                }
                return;
            }

            if (tentativesRestantes > 0) {
                setTimeout(() => demarrerCarte(tentativesRestantes - 1), 200);
            } else {
                console.error("Erreur de carte : délai d'attente de Leaflet dépassé.");
            }
        }
        demarrerCarte(50); // jusqu'à ~10 secondes d'attente

        function createMarker(spot) {
            if (typeof L === 'undefined' || !map || markers[spot.id]) return;
            try {
                const marker = L.marker([spot.lat, spot.lng]).addTo(map);
                marker.bindPopup(() => createPopupContent(spot));
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    selectSpot(spot, false);
                });
                markers[spot.id] = marker;
            } catch(err) { console.error(err); }
        }

        // --- Détection de coordonnées GPS tapées ou collées dans la recherche ---

        function dmsVersDecimal(deg, min, sec, dir) {
            deg = parseFloat(deg);
            min = parseFloat(min);
            sec = parseFloat(String(sec).replace(',', '.'));
            if (!isFinite(deg) || !isFinite(min) || !isFinite(sec)) return null;
            let dd = Math.abs(deg) + (min / 60) + (sec / 3600);
            const d = (dir || '').toUpperCase();
            if (deg < 0 || d === 'S' || d === 'O' || d === 'W') dd = -dd;
            return dd;
        }

        function parseCoordonnees(texte) {
            if (!texte) return null;
            const txt = texte.trim();

            // Format DMS, ex : 44°51'52.2"N 1°21'11.5"E
            const dmsRegex = /([+-]?\d{1,3})\s*°\s*(\d{1,2})\s*['′]\s*(\d{1,2}(?:[.,]\d+)?)\s*["″]?\s*([NSEOWnsew]?)\s*[,;\s]+\s*([+-]?\d{1,3})\s*°\s*(\d{1,2})\s*['′]\s*(\d{1,2}(?:[.,]\d+)?)\s*["″]?\s*([NSEOWnsew]?)/;
            const dmsMatch = txt.match(dmsRegex);
            if (dmsMatch) {
                const lat = dmsVersDecimal(dmsMatch[1], dmsMatch[2], dmsMatch[3], dmsMatch[4]);
                const lng = dmsVersDecimal(dmsMatch[5], dmsMatch[6], dmsMatch[7], dmsMatch[8]);
                if (lat !== null && lng !== null && Math.abs(lat) <= 90 && Math.abs(lng) <= 180) {
                    return { lat, lng };
                }
            }

            // Format décimal, ex : 44.8645, 1.3532 / 44,8645 1,3532 / N44.8645 E1.3532 / 44.8645N, 1.3532O
            const decRegex = /^([NSEOWnsew])?\s*([+-]?\d{1,3}(?:[.,]\d+)?)\s*°?\s*([NSEOWnsew])?\s*[,;\s]+\s*([NSEOWnsew])?\s*([+-]?\d{1,3}(?:[.,]\d+)?)\s*°?\s*([NSEOWnsew])?$/;
            const decMatch = txt.match(decRegex);
            if (decMatch) {
                let latNum = parseFloat(decMatch[2].replace(',', '.'));
                let lngNum = parseFloat(decMatch[5].replace(',', '.'));
                const latLettre = (decMatch[1] || decMatch[3] || '').toUpperCase();
                const lngLettre = (decMatch[4] || decMatch[6] || '').toUpperCase();
                if (latLettre === 'S') latNum = -Math.abs(latNum);
                if (lngLettre === 'O' || lngLettre === 'W') lngNum = -Math.abs(lngNum);
                if (isFinite(latNum) && isFinite(lngNum) && Math.abs(latNum) <= 90 && Math.abs(lngNum) <= 180) {
                    return { lat: latNum, lng: lngNum };
                }
            }
            return null;
        }

        function afficherResultatCoordonnees(coords, container) {
            container.innerHTML = '';

            const divSep = document.createElement('div');
            divSep.className = 'search-divider';
            divSep.innerText = '📍 Coordonnées GPS détectées';
            container.appendChild(divSep);

            const div = document.createElement('div');
            div.className = 'search-result-item public-db-item';
            div.innerHTML = `🎯 <b>Aller à ce point</b><small style="display:block;color:#555">Lat ${coords.lat.toFixed(6)} — Lng ${coords.lng.toFixed(6)}</small>`;
            div.onclick = () => {
                if (map) map.setView([coords.lat, coords.lng], 15);
                afficherLieuClique(coords);
                if (searchInput) searchInput.value = '';
                container.style.display = 'none';
            };
            container.appendChild(div);
            container.style.display = 'block';
        }

        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results');

        if(searchInput) {
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                const query = searchInput.value.trim();

                if (query === '') {
                    resultsContainer.innerHTML = '';
                    resultsContainer.style.display = 'none';
                    return;
                }

                // Coordonnées GPS tapées ou collées (prioritaire sur la recherche par nom)
                const coords = parseCoordonnees(query);
                if (coords) {
                    afficherResultatCoordonnees(coords, resultsContainer);
                    return;
                }

                if (query.length < 3) {
                    resultsContainer.innerHTML = '<div class="search-result-item" style="color:#888; cursor:default;">Tapez au moins 3 caractères...</div>';
                    resultsContainer.style.display = 'block';
                    return;
                }

                const localFiltered = allSpots.filter(spot => 
                    spot.title.toLowerCase().includes(query.toLowerCase())
                );

                renderSearchResults(localFiltered, [], resultsContainer);

                searchTimeout = setTimeout(async () => {
                    try {
                        const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lang=fr&limit=6&bbox=0.0,44.5,1.8,45.7`;
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Réponse HTTP ' + response.status);
                        const data = await response.json();
                        
                        if (data && data.features) {
                            const publicResults = data.features.map(feat => {
                                const props = feat.properties;
                                let name = props.name || props.street || "Lieu sans nom";
                                let context = [props.postcode, props.city].filter(Boolean).join(' ');
                                
                                return {
                                    id: 'public-' + (props.osm_id || Math.random()),
                                    title: name + (context ? ` (${context})` : ''),
                                    lat: feat.geometry.coordinates[1],
                                    lng: feat.geometry.coordinates[0],
                                    desc: [`Catégorie : ${props.type || 'Lieu-dit'}`, `Trouvé via OpenStreetMap.`],
                                    img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&auto=format&fit=crop&q=60",
                                    isCustom: true
                                };
                            });
                            renderSearchResults(localFiltered, publicResults, resultsContainer);
                        }
                    } catch (err) {
                        console.error("Erreur API Photon :", err);
                        // On garde les résultats locaux déjà affichés et on ajoute juste un avertissement,
                        // au lieu de laisser échouer la recherche silencieusement.
                        renderSearchResults(localFiltered, [], resultsContainer, true);
                    }
                }, 300);
            });
        }

        function renderSearchResults(localItems, publicItems, container, publicIndisponible) {
            container.innerHTML = '';

            if (localItems.length === 0 && publicItems.length === 0 && !publicIndisponible) {
                container.innerHTML = '<div class="search-result-item" style="color:#888; cursor:default;">Aucun résultat en Dordogne...</div>';
                container.style.display = 'block';
                return;
            }

            if (localItems.length > 0) {
                const divSep = document.createElement('div');
                divSep.className = 'search-divider';
                divSep.innerText = '✨ Vos spots & Secrets';
                container.appendChild(divSep);

                localItems.forEach(spot => {
                    const div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.innerHTML = `📍 <b>${spot.title}</b>`;
                    div.onclick = () => triggerSelection(spot);
                    container.appendChild(div);
                });
            }

            const filteredPublic = publicItems.filter(p => !allSpots.some(l => l.title.split(' (')[0] === p.title.split(' (')[0]));

            if (filteredPublic.length > 0) {
                const divSep = document.createElement('div');
                divSep.className = 'search-divider';
                divSep.innerText = '🌐 Base Publique OpenStreetMap';
                container.appendChild(divSep);

                filteredPublic.forEach(spot => {
                    const div = document.createElement('div');
                    div.className = 'search-result-item public-db-item';
                    div.innerHTML = `➕ <b>${spot.title}</b> <small style="display:block;color:#555">Ajouter et localiser</small>`;
                    div.onclick = () => {
                        spot.id = "custom-" + Date.now();
                        allSpots.push(spot);
                        createMarker(spot);
                        triggerSelection(spot);
                    };
                    container.appendChild(div);
                });
            } else if (publicIndisponible) {
                const divWarn = document.createElement('div');
                divWarn.className = 'search-result-item';
                divWarn.style.color = '#888';
                divWarn.style.cursor = 'default';
                divWarn.innerHTML = '🌐 Base publique OpenStreetMap momentanément indisponible.';
                container.appendChild(divWarn);
            }
            container.style.display = 'block';
        }

        function triggerSelection(spot) {
            selectSpot(spot, true);
            if(searchInput) searchInput.value = '';
            resultsContainer.style.display = 'none';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                resultsContainer.style.display = 'none';
            }
        });

        // --- Gestion du clic sur la carte : afficher les coordonnées et proposer le partage ---

        function afficherLieuClique(latlng) {
            if (tempMarker) {
                map.removeLayer(tempMarker);
                tempMarker = null;
            }
            const lat = latlng.lat.toFixed(6);
            const lng = latlng.lng.toFixed(6);

            tempMarker = L.marker([lat, lng], { opacity: 0.85 }).addTo(map);
            tempMarker.bindPopup(createLieuCliquePopup(lat, lng), { closeOnClick: false }).openPopup();

            // Si on ferme la bulle, on retire le repère temporaire de la carte.
            tempMarker.on('popupclose', () => {
                if (tempMarker) {
                    map.removeLayer(tempMarker);
                    tempMarker = null;
                }
            });
        }

        function createLieuCliquePopup(lat, lng) {
            const div = document.createElement('div');
            div.className = 'popup-bubble-content';
            div.innerHTML = `
                <h4>📍 Lieu sélectionné</h4>
                <p style="font-size:0.85rem; color:#555; margin:0 0 8px 0; text-align:left;">
                    Latitude : ${lat}<br>Longitude : ${lng}
                </p>
                <div style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap;">
                    <button class="popup-btn" onclick="enregistrerLieuClique('${lat}', '${lng}', this); event.stopPropagation();">📖 Enregistrer</button>
                    <button class="popup-btn" onclick="partagerLieu('${lat}', '${lng}'); event.stopPropagation();">📤 Partager</button>
                    <button class="popup-btn" onclick="copierCoordonnees('${lat}', '${lng}', this); event.stopPropagation();">📋 Copier</button>
                </div>
            `;
            return div;
        }

        function enregistrerLieuClique(lat, lng, btnEl) {
            const id = 'gps-' + Date.now();
            const spot = {
                id: id,
                title: `Point GPS (${lat}, ${lng})`,
                lat: parseFloat(lat),
                lng: parseFloat(lng),
                desc: ['Lieu enregistré manuellement depuis la carte.', `Coordonnées : ${lat}, ${lng}`],
                img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&auto=format&fit=crop&q=60",
                isCustom: true
            };

            allSpots.push(spot);
            toggleNotebook(id); // ajoute aux favoris + sauvegarde dans customSpots/localStorage
            createMarker(spot); // pose un marqueur permanent (en plus du repère temporaire)

            if (btnEl) {
                btnEl.innerText = '✅ Enregistré';
                btnEl.disabled = true;
                btnEl.classList.add('active');
            }
        }

        async function partagerLieu(lat, lng) {
            const url = `https://www.google.com/maps?q=${lat},${lng}`;
            const texte = `📍 Position : ${lat}, ${lng}\n${url}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Position partagée - Club des Périgourdins',
                        text: texte,
                        url: url
                    });
                } catch (err) {
                    // L'utilisateur a annulé le partage, rien à faire.
                }
            } else {
                copierCoordonnees(lat, lng, null);
                alert("Le partage natif n'est pas disponible sur ce navigateur.\nLe lien a été copié dans le presse-papier :\n" + url);
            }
        }

        function copierCoordonnees(lat, lng, btnEl) {
            const url = `https://www.google.com/maps?q=${lat},${lng}`;
            const texte = `${lat}, ${lng} — ${url}`;

            const copieDeSecours = (txt) => {
                const ta = document.createElement('textarea');
                ta.value = txt;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch (e) { /* ignore */ }
                document.body.removeChild(ta);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(texte).catch(() => copieDeSecours(texte));
            } else {
                copieDeSecours(texte);
            }

            if (btnEl) {
                const original = btnEl.innerText;
                btnEl.innerText = '✅ Copié !';
                setTimeout(() => { btnEl.innerText = original; }, 1500);
            }
        }

        function createPopupContent(spot) {
            const isFavorite = savedSpotIds.includes(spot.id.toString());
            const div = document.createElement('div');
            div.className = 'popup-bubble-content';
            div.innerHTML = `
                <h4>${spot.title}</h4>
                <button class="popup-btn ${isFavorite ? 'active' : ''}" onclick="toggleNotebook('${spot.id}'); refreshPopup('${spot.id}'); event.stopPropagation();">
                    ${isFavorite ? '❤️ Retirer' : '📖 Inscrire au carnet'}
                </button>
            `;
            return div;
        }

        function refreshPopup(spotId) {
            const marker = markers[spotId];
            if (marker && map && marker.isPopupOpen()) {
                marker.setPopupContent(createPopupContent(allSpots.find(s => s.id == spotId)));
            }
        }

        function selectSpot(spot, repositionMap = true) {
            if (map && markers[spot.id]) {
                if (repositionMap) map.setView([spot.lat, spot.lng], 14);
                markers[spot.id].openPopup();
            }

            const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`;
            const googleImagesUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(spot.title)}`;
            const isFavorite = savedSpotIds.includes(spot.id.toString());

            const detailsContent = document.getElementById('details-content');
            let descListHtml = spot.desc.map(line => `<li>${line}</li>`).join('');

            detailsContent.innerHTML = `
                <div class="details-info">
                    <h2>${spot.title} <small style="font-size:0.8rem; color:${spot.isCustom ? 'var(--public-db)':'var(--accent)'}">${spot.isCustom ? '[Nouveau Site]' : '[Secret Local]'}</small></h2>
                    <ul>${descListHtml}</ul>
                    <div class="btn-container">
                        <a href="${googleMapsUrl}" target="_blank" class="btn btn-google">🗺️ Itinéraire</a>
                        <a href="${googleImagesUrl}" target="_blank" class="btn btn-images">📸 Photos</a>
                        <button id="notebook-toggle-btn" class="btn btn-notebook ${isFavorite ? 'active' : ''}" onclick="toggleNotebook('${spot.id}'); refreshPopup('${spot.id}');">
                            ${isFavorite ? '❤️ Inscrit dans mon Carnet' : '📖 Inscrire dans mon Carnet'}
                        </button>
                        <button class="btn btn-close-action" onclick="closeDetails()">✖️ Fermer</button>
                    </div>
                </div>
            `;
            document.getElementById('details-panel').style.display = 'block';
        }

        function toggleNotebook(spotId) {
            const index = savedSpotIds.indexOf(spotId.toString());
            const mainListItem = document.getElementById(`spot-item-${spotId}`);
            const detailBtn = document.getElementById('notebook-toggle-btn');
            const targetSpot = allSpots.find(s => s.id == spotId);

            if (index > -1) {
                savedSpotIds.splice(index, 1);
                if (mainListItem) mainListItem.classList.remove('is-fav');
                if (detailBtn) {
                    detailBtn.classList.remove('active');
                    detailBtn.innerText = '📖 Inscrire dans mon Carnet';
                }
                if (targetSpot && targetSpot.isCustom) {
                    customSpots = customSpots.filter(s => s.id != spotId);
                    try { localStorage.setItem('perigourdins_custom_spots', JSON.stringify(customSpots)); } catch(e){}
                }
            } else {
                savedSpotIds.push(spotId.toString());
                if (mainListItem) mainListItem.classList.add('is-fav');
                if (detailBtn) {
                    detailBtn.classList.add('active');
                    detailBtn.innerText = '❤️ Inscrit dans mon Carnet';
                }
                if (targetSpot && targetSpot.isCustom && !customSpots.some(s => s.id == spotId)) {
                    customSpots.push(targetSpot);
                    try { localStorage.setItem('perigourdins_custom_spots', JSON.stringify(customSpots)); } catch(e){}
                }
            }

            try { localStorage.setItem('perigourdins_notebook_ids', JSON.stringify(savedSpotIds)); } catch(e){}
            updateNotebookUI();
        }

        function updateNotebookUI() {
            const select = document.getElementById('notebook-select');
            if(!select) return;
            select.innerHTML = '';
            document.getElementById('nb-count').innerText = savedSpotIds.length;

            if (savedSpotIds.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.innerText = 'Votre carnet est vide';
                select.appendChild(opt);
                return;
            }

            const optDefault = document.createElement('option');
            optDefault.value = '';
            optDefault.innerText = '— Choisir un spot dans le carnet —';
            select.appendChild(optDefault);

            allSpots.forEach(spot => {
                if (savedSpotIds.includes(spot.id.toString())) {
                    const opt = document.createElement('option');
                    opt.value = spot.id;
                    opt.innerText = `❤️ ${spot.title}`;
                    select.appendChild(opt);
                }
            });
        }

        const notebookSelect = document.getElementById('notebook-select');
        if (notebookSelect) {
            notebookSelect.addEventListener('change', () => {
                const chosenId = notebookSelect.value;
                if (!chosenId) return;
                const spot = allSpots.find(s => s.id == chosenId);
                if (spot) selectSpot(spot, true);
                notebookSelect.value = '';
            });
        }

        function closeDetails() {
            document.getElementById('details-panel').style.display = 'none';
        }

        updateNotebookUI();
    </script>
</body>
</html>
