name: Update lieux.json

on:
  repository_dispatch:
    types: [add-lieu]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update lieux.json
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(process.env.PAYLOAD || '{}');
          const file = 'lieux.json';
          const data = fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, 'utf8')) : { lieux: [] };
          if (!Array.isArray(data.lieux)) data.lieux = [];
          data.lieux.push({
            id: payload.id || `admin-${Date.now()}`,
            title: payload.title || 'Lieu sans nom',
            lat: Number(payload.lat),
            lng: Number(payload.lng),
            desc: payload.desc || '',
            img: payload.img || null,
            isCustom: true,
            createdAt: new Date().toISOString()
          });
          fs.writeFileSync(file, JSON.stringify(data, null, 2));
          NODE

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add lieux.json
          git commit -m "Add new lieu" || echo "No changes"
          git push